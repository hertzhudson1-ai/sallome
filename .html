<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduStream 3D | The Future of Learning</title>
    <style>
        /* General Styling */
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #050505; 
            color: white; 
            overflow-x: hidden;
        }

        /* 3D Background Canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Overlay UI */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            z-index: 1;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        h1 { font-size: 3rem; margin-bottom: 10px; color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
        
        /* Search/AI Section */
        .search-box { display: flex; gap: 10px; }
        input[type="text"] {
            flex-grow: 1;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 1.1rem;
        }
        button {
            padding: 15px 25px;
            border-radius: 10px;
            border: none;
            background: #00d4ff;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #008fb3; transform: scale(1.05); }

        /* Video Section */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .video-card {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }
        .video-card:hover { transform: translateY(-5px); border: 1px solid #00d4ff; }
        video { width: 100%; display: block; }
        .card-content { padding: 15px; }

        /* Answer Box */
        #answer-display {
            display: none;
            border-left: 5px solid #00d4ff;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="glass-panel">
            <h1>EduStream 3D</h1>
            <p>Ask a question and hear the answer instantly.</p>
            <div class="search-box">
                <input type="text" id="queryInput" placeholder="What do you want to learn today?">
                <button onclick="processAI()">Ask AI</button>
            </div>
        </div>

        <div id="answer-display" class="glass-panel">
            <h2 style="color: #00d4ff;">Answer:</h2>
            <p id="answerText" style="font-size: 1.2rem; line-height: 1.6;"></p>
            <button onclick="narrateText()" style="background: #ff007b; color: white;">🔊 Play Narrator</button>
        </div>

        <div class="glass-panel">
            <h2>Upload Educational Video</h2>
            <input type="file" id="videoUpload" accept="video/*" style="margin-bottom: 10px;">
            <p style="font-size: 0.8rem; color: #aaa;">Your videos will appear in the library below.</p>
        </div>

        <div class="glass-panel">
            <h2>Learning Library</h2>
            <div class="video-grid" id="videoGrid">
                <div class="video-card">
                    <video controls>
                        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                    </video>
                    <div class="card-content">
                        <h3>Intro to Physics</h3>
                        <a href="https://www.w3schools.com/html/mov_bbb.mp4" download="Physics_Lesson" style="color: #00d4ff; text-decoration: none; font-weight: bold;">⬇ Download Lesson</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. --- 3D BACKGROUND (Three.js) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Add floating particles for 3D effect
        const geometry = new THREE.TorusGeometry(10, 3, 16, 100);
        const material = new THREE.MeshBasicMaterial({ color: 0x00d4ff, wireframe: true });
        const torus = new THREE.Mesh(geometry, material);
        scene.add(torus);

        camera.position.z = 30;

        function animate() {
            requestAnimationFrame(animate);
            torus.rotation.x += 0.01;
            torus.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        // 2. --- AI & NARRATOR LOGIC ---
        function processAI() {
            const input = document.getElementById('queryInput').value;
            const display = document.getElementById('answer-display');
            const text = document.getElementById('answerText');

            if(input.trim() === "") return;

            display.style.display = "block";
            // In a real app, you'd fetch() from an AI API here.
            text.innerText = "You asked about '" + input + "'. Here is the direct answer: In science and education, " + input + " is defined as a key concept that drives progress. To learn more, watch the videos below.";
            
            // Auto-scroll to answer
            display.scrollIntoView({ behavior: 'smooth' });
        }

        function narrateText() {
            const text = document.getElementById('answerText').innerText;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 1;
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        // 3. --- VIDEO UPLOAD SIMULATION ---
        const videoUpload = document.getElementById('videoUpload');
        const videoGrid = document.getElementById('videoGrid');

        videoUpload.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                const newVideoCard = document.createElement('div');
                newVideoCard.className = 'video-card';
                newVideoCard.innerHTML = `
                    <video controls src="${url}"></video>
                    <div class="card-content">
                        <h3>${file.name}</h3>
                        <a href="${url}" download="${file.name}" style="color: #00d4ff; text-decoration: none; font-weight: bold;">⬇ Download Lesson</a>
                    </div>
                `;
                videoGrid.prepend(newVideoCard);
            }
        });

        // Resize 3D on window change
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
